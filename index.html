    <style>

      /* แสงไฟ Ambient ด้านหลัง */
      .ambient-light-1 {

        background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, transparent 60%);

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* ปรับแต่งช่อง Input ให้ดูล้ำ */
      input, select, textarea {
        background-color: rgba(0, 0, 0, 0.4) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;

        border-radius: 0.75rem !important;

      input:focus, select:focus, textarea:focus {
        border-color: #0ea5e9 !important;
        box-shadow: 0 0 15px rgba(14, 165, 233, 0.2) !important;
        outline: none;

      input[type="date"] {

        cursor: pointer;

      input[type="file"]::file-selector-button {

        border: 1px solid rgba(255,255,255,0.05);

        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 15px;
        font-weight: 600;
        transition: 0.3s;
      }

        background: rgba(6, 182, 212, 0.3);
        border-color: rgba(6, 182, 212, 0.5);
      }

      /* Radio Button สำหรับความเร่งด่วน */

        transform: scale(1.05);
        background-color: rgba(0,0,0,0.5);
      }

      .loading { opacity: 0.5; pointer-events: none; }
      select option { background-color: #0f172a; color: #f1f5f9; }
    </style>

    <script>
      window.onload = function() {
        google.script.run.withSuccessHandler(populateUsers).getUserList();
        document.querySelector('input[name="startDate"]').valueAsDate = new Date();
      };

      function populateUsers(users) {
        const select = document.getElementById('assigneeSelect');
        select.innerHTML = '<option value="">-- เลือกผู้รับผิดชอบ --</option>';
        users.forEach(user => {
          const option = document.createElement('option');
          option.value = user.email;
          option.text = user.name + " (" + user.email + ")";
          option.className = "bg-slate-900 text-white";
          select.appendChild(option);
        });
      }

      function submitForm(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const form = document.getElementById('taskForm');
        const fileInput = document.getElementById('pdfFile');
        
        btn.disabled = true;
        btn.innerHTML = '⚡ กำลังประมวลผลข้อมูล...';
        document.body.classList.add('loading');

        if (fileInput.files.length > 0) {
          const file = fileInput.files[0];
          const reader = new FileReader();
          reader.onload = function(event) {
            const base64Data = event.target.result.split(',')[1];
            btn.innerHTML = '📂 กำลังอัปโหลด PDF...';
            google.script.run
              .withSuccessHandler(function(fileUrl) {
                document.getElementById('docLink').value = fileUrl;
                btn.innerHTML = '💾 กำลังบันทึกงานเข้าระบบ...';
                google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFailure).addNewTask(form);
              })
              .withFailureHandler(onFailure)
              .uploadPDF(file.name, base64Data);
          };
          reader.readAsDataURL(file);
        } else {
          document.getElementById('docLink').value = "";
          google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFailure).addNewTask(form);
        }
      }

      function onSuccess(response) {
        const btn = document.getElementById('submitBtn');
        document.body.classList.remove('loading');
        btn.disabled = false;
        btn.innerHTML = '🚀 บันทึกและส่งต่องาน';

        if (response.success) {
          document.getElementById('taskForm').reset();
          document.getElementById('modalIcon').innerHTML = '🎉';
          document.getElementById('modalIcon').className = 'text-6xl mb-6 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]';
          showModal(true, response.message);
        } else {
          document.getElementById('modalIcon').innerHTML = '⚠️';
          document.getElementById('modalIcon').className = 'text-6xl mb-6 drop-shadow-[0_0_15px_rgba(244,63,94,0.5)]';
          showModal(false, response.message);
        }
      }

      function onFailure(error) {
        document.body.classList.remove('loading');
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerHTML = '🚀 บันทึกและส่งต่องาน';
        document.getElementById('modalIcon').innerHTML = '❌';
        document.getElementById('modalIcon').className = 'text-6xl mb-6 drop-shadow-[0_0_15px_rgba(244,63,94,0.5)]';
        showModal(false, "เกิดข้อผิดพลาด: " + (error.message || error));
      }

      function showModal(isSuccess, message) {
        const modal = document.getElementById('resultModal');
        document.getElementById('modalTitle').innerText = isSuccess ? 'บันทึกสำเร็จ!' : 'ข้อผิดพลาด';
        document.getElementById('modalMessage').innerHTML = message;
        modal.classList.remove('hidden');
      }

      function closeModal() {
        document.getElementById('resultModal').classList.add('hidden');
      }
    </script>
